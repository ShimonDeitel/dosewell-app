name: Dosewell
options:
  bundleIdPrefix: com.shimondeitel.petmed
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Dosewell:
    type: application
    platform: iOS
    sources:
      - path: Dosewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petmed
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Dosewell/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DosewellTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DosewellTests
      - path: Dosewell.storekit
    dependencies:
      - target: Dosewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petmed.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DosewellUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DosewellUITests
    dependencies:
      - target: Dosewell
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.petmed.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Dosewell:
    build:
      targets:
        Dosewell: all
        DosewellTests: [test]
        DosewellUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Dosewell.storekit
    test:
      config: Debug
      storeKitConfiguration: Dosewell.storekit
      targets:
        - DosewellTests
        - DosewellUITests
    archive:
      config: Release
